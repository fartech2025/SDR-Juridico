name: Style Lint (manual)

on:
  workflow_dispatch:

jobs:
  style-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 'Sdr juridico'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'Sdr juridico/package-lock.json'

      - name: Install deps
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build (sanity)
        run: npm run build
